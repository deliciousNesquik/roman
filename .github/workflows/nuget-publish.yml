name: Публикация пакета в nuget

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test Roman.Tests/Roman.Tests.csproj -c Release --no-build

      - name: Version from tag (vX.Y.Z)
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Pack (nupkg + snupkg)
        run: |
          dotnet pack Roman/Roman.csproj -c Release --no-build -o ./artifacts \
            /p:PackageVersion=${VERSION} \
            /p:ContinuousIntegrationBuild=true \
            /p:IncludeSymbols=true \
            /p:SymbolPackageFormat=snupkg

      - name: Publish to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "${NUGET_API_KEY}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate

          dotnet nuget push "./artifacts/*.snupkg" \
            --api-key "${NUGET_API_KEY}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate
